name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Full sweep: bazel test //docs/... + //examples/... on linux + macos.
  # Cold runs ~30-60s (libpg_query source download + cc_library build).
  test:
    name: bazel test //...
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: bazel-contrib/setup-bazel@0.10.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}-${{ matrix.os }}
          repository-cache: true
      - run: bazel test //docs/... //examples/... --test_output=errors

  buildifier:
    name: buildifier lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: install buildifier
        run: |
          curl -fsSL -o /usr/local/bin/buildifier \
            https://github.com/bazelbuild/buildtools/releases/download/v7.3.1/buildifier-linux-amd64
          chmod +x /usr/local/bin/buildifier
      - run: buildifier --mode=check --lint=warn -r .

  # Gate 1 — regen idempotence. Re-emits every cluster from its Lean
  # source and asserts the committed Rust/C files match. Catches the
  # "Lean spec edited, regen forgotten" failure mode.
  gate1_regen_idempotence:
    name: gate 1 — regen idempotence
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: install elan + Lean toolchain
        run: |
          curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
      - name: pin Lean toolchain from tools/lake/lean-toolchain
        run: |
          export PATH="$HOME/.elan/bin:$PATH"
          elan toolchain install "$(cat tools/lake/lean-toolchain)"
          lean --version
      - run: tools/regen/check-all.sh

  # Gate 2 — cluster behavioral diff-test. For each emit-Rust cluster
  # crate with a `tests/diff_*.rs` harness, runs `cargo test --release`
  # to assert bit-identical Datums + matching FmgrErrorKind between
  # Lean-emitted Rust and the vendored real-PG C body. Each c_oracle/
  # is self-contained — no PG checkout needed.
  gate2_behavioral_diff:
    name: gate 2 — behavioral diff
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            rust/pg_bytea
            rust/pg_cash_arith
            rust/pg_date_arith
            rust/pg_float_arith
            rust/pg_float_to_int
            rust/pg_float_unary
            rust/pg_int4_arith
            rust/pg_int4_bitwise
            rust/pg_int4_cmp
            rust/pg_int4_div
            rust/pg_int4_hash
            rust/pg_int4_unary
            rust/pg_int_casts
            rust/pg_interval
            rust/pg_macaddr
            rust/pg_text
            rust/pg_tid
            rust/pg_uuid
      - run: tools/regen/check-all-behavioral.sh
